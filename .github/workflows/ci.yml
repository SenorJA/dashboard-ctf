name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio bandit safety
      - name: Run tests with coverage
        working-directory: backend
        env:
          SUPABASE_URL: ""
          SUPABASE_KEY: ""
          KALI_IP: ""
          KALI_MCP_URL: ""
        run: |
          python -m pytest tests/ -k "not test_slow_hook" --cov=. --cov-report=xml --cov-report=term-missing -q
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit safety
      - name: Bandit security scan
        working-directory: backend
        run: bandit -r . -ll -ii -x tests || true   # medium+ severity, don't fail build on low
      - name: Safety dependency scan
        continue-on-error: true
        run: safety check -r backend/requirements.txt || true