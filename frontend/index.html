<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Dashboard - Control Panel</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-slate-900 text-slate-200 h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold tracking-wider text-slate-100">
            <span class="text-emerald-500">CTF</span>_DASHBOARD
        </h1>
        <div class="flex items-center space-x-2">
            <div id="status-indicator" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]">
            </div>
            <span id="status-text" class="text-sm font-semibold text-slate-400">Desconectado</span>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col space-y-4 max-w-6xl mx-auto w-full">

        <div class="flex space-x-4">
            <button id="btn-connect"
                class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-md font-semibold transition-colors duration-200 shadow-md">
                Conectar a Kali
            </button>
            <button id="btn-disconnect"
                class="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-md font-semibold transition-colors duration-200 shadow-md">
                Desconectar
            </button>
            <div class="flex-1 flex">
                <input type="text" id="cmd-input" placeholder="Introduce un comando (ej: ifconfig, ls -la)..."
                    class="terminal flex-1 bg-slate-800 border border-slate-600 rounded-l-md px-4 focus:outline-none focus:border-emerald-500 text-slate-200">
                <button id="btn-send"
                    class="bg-slate-700 hover:bg-slate-600 border border-slate-600 border-l-0 rounded-r-md px-6 font-semibold transition-colors">
                    Ejecutar
                </button>
            </div>
        </div>

        <div class="flex-1 bg-[#0f172a] rounded-lg border border-slate-700 p-4 shadow-inner relative">
            <div
                class="absolute top-0 left-0 w-full h-8 bg-slate-800 rounded-t-lg border-b border-slate-700 flex items-center px-4">
                <span class="text-xs text-slate-400 font-semibold tracking-widest">javi@192.168.1.138 (SSH)</span>
            </div>
            <pre id="terminal-output"
                class="terminal mt-8 h-[calc(100%-2rem)] overflow-y-auto text-sm text-slate-300 whitespace-pre-wrap leading-relaxed"></pre>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
</body>

</html>
