# ── M.I.R.V. + Kali Container Full Stack ──────────────────
#   docker compose up -d --build
#   Open http://localhost:8000 (MIRV dashboard)
#   Kali tools available without a separate VM
# ────────────────────────────────────────────────────────────
services:

  # ── Kali Linux (Tools Container) ──
  # 50+ security tools pre-installed.
  # MIRV connects via SSH (auto-configured).
  kali-tools:
    build:
      context: .
      dockerfile: docker/kali-mcp.Dockerfile
    container_name: mirv-kali-tools
    ports:
      - "${KALI_SSH_PORT:-2222}:22"
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    volumes:
      - kali-sessions:/tmp/workspace/sessions
      - kali-wordlists:/usr/share/wordlists
    healthcheck:
      test: ["CMD", "sshd", "-t"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── M.I.R.V. Backend (FastAPI) ──
  # Dashboard web + SSH proxy + findings + REST API
  mirv-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mirv-backend
    ports:
      - "${MIRV_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      kali-tools:
        condition: service_healthy
    environment:
      - KALI_IP=kali-tools
      - KALI_PORT=22
      - KALI_USER=root
      - KALI_PASS=mirv
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - COMPOSE_PROJECT_NAME=proyectociber
    volumes:
      - mirv-logs:/app/backend/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kali-sessions:
  kali-wordlists:
  mirv-logs:
