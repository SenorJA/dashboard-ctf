# ── M.I.R.V. + kali-mcp Full Stack ────────────────────────
#   docker compose up -d
#   Open http://localhost:8000 (MIRV dashboard)
#   AI agents connect to http://localhost:666/mcp (kali-mcp)
# ────────────────────────────────────────────────────────────
services:

  # ── Kali MCP Server ──
  # Provides 50+ security tools via MCP protocol
  # Auto-detected by MIRV backend when KALI_MCP_URL is set
  kali-mcp:
    build:
      context: .
      dockerfile: docker/kali-mcp.Dockerfile
    container_name: mirv-kali-mcp
    ports:
      - "${KALI_MCP_PORT:-666}:8000"
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    volumes:
      - kali-mcp-sessions:/tmp/workspace/sessions
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── M.I.R.V. Backend (FastAPI) ──
  # Dashboard web + SSH proxy + findings + REST API
  mirv-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mirv-backend
    ports:
      - "${MIRV_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      kali-mcp:
        condition: service_healthy
    environment:
      - KALI_MCP_URL=http://kali-mcp:8000/mcp
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - KALI_IP=${KALI_IP:-}
      - KALI_USER=${KALI_USER:-}
      - KALI_PASS=${KALI_PASS:-}
    volumes:
      - mirv-logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kali-mcp-sessions:
  mirv-logs:
